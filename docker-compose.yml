# =============================================================================
# mBot Studio — Docker Compose
# =============================================================================
# Runs the mBot Studio server.
# Expects an external MQTT broker (Mosquitto) on your network.
# =============================================================================

services:
  mbot-studio:
    build: .
    image: mbot-studio:latest
    container_name: mbot-studio
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3001
    volumes:
      # Persist robot config across restarts
      - mbot-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  mbot-data:
